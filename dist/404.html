<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Adam Zafir</title>
<meta name="description" content="You've crossed the event horizon. This page doesn't exist.">
<meta name="theme-color" content="#020108">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --amber: #ffaa00;
  --orange: #ff5500;
  --bg: #020108;
}

html, body {
  height: 100%;
  overflow: hidden;
}

html {
  scrollbar-width: thin;
  scrollbar-color: rgba(255,170,0,0.3) var(--bg);
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Geologica', sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Film grain */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  opacity: 0.05;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 3px 3px, 3px 3px;
  mix-blend-mode: soft-light;
  animation: film-drift 16s linear infinite;
}

@keyframes film-drift {
  0% { transform: translate3d(0,0,0); }
  50% { transform: translate3d(-0.6%, 0.4%, 0); }
  100% { transform: translate3d(0,0,0); }
}

canvas#blackhole {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.25) 55%, rgba(0,0,0,0.7) 100%);
}

.brand {
  position: fixed;
  top: 24px;
  left: 28px;
  z-index: 5;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: #fff;
  text-decoration: none;
  opacity: 0;
  animation: fade-in 0.8s ease 0.6s forwards;
}

.brand:hover {
  color: var(--amber);
}

.content {
  position: relative;
  z-index: 3;
  text-align: center;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fade-up 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
}

.error-code {
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.6rem, 1.1vw, 0.8rem);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: rgba(255,170,0,0.5);
  margin-bottom: 18px;
  text-shadow: 0 0 20px rgba(255,170,0,0.15);
}

.title {
  font-size: clamp(2.8rem, 8vw, 6.5rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  background: linear-gradient(135deg, #fff 10%, var(--amber) 50%, var(--orange) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 50px rgba(255,170,0,0.25));
  margin-bottom: 14px;
}

.subtitle {
  font-size: clamp(0.92rem, 1.6vw, 1.15rem);
  font-weight: 300;
  color: rgba(255,255,255,0.4);
  max-width: 380px;
  line-height: 1.65;
  margin-bottom: 38px;
}

.home-link {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
  text-decoration: none;
  padding: 14px 28px;
  border: 1px solid rgba(255,170,0,0.25);
  border-radius: 10px;
  background: rgba(255,170,0,0.06);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  transition: all 0.3s ease;
}

.home-link:hover {
  border-color: rgba(255,170,0,0.55);
  background: rgba(255,170,0,0.12);
  box-shadow: 0 0 40px rgba(255,170,0,0.1);
  color: #fff;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fade-in {
  to { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .content { opacity: 1; transform: none; }
  .brand { opacity: 1; }
}
</style>
</head>
<body>

<canvas id="blackhole"></canvas>
<div class="vignette"></div>

<a class="brand" href="/">Adam Zafir</a>

<div class="content">
  <div class="error-code">Error 404</div>
  <h1 class="title">Lost in the<br>Event Horizon</h1>
  <p class="subtitle">The page you're looking for has crossed the event horizon. There's no retrieving it now.</p>
  <a class="home-link" href="/">Escape to safety &rarr;</a>
</div>

<script>
(() => {
  const canvas = document.getElementById('blackhole');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy;
  let time = 0;
  const particles = [];
  const stars = [];

  const isMobile = window.innerWidth < 768;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
  }

  window.addEventListener('resize', resize);
  resize();

  // Background stars
  const starCount = isMobile ? 200 : 400;
  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      size: 0.3 + Math.random() * 1.2,
      flicker: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 2,
    });
  }

  // Accretion disk particles
  const count = isMobile ? 900 : 1800;
  const minR = isMobile ? 55 : 85;
  const maxR = () => Math.min(W, H) * 0.55;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const mr = maxR();
    const radius = minR + Math.pow(Math.random(), 0.6) * (mr - minR);
    const speed = (0.15 + Math.random() * 0.45) / Math.pow(radius / 100, 0.65);
    const wobble = Math.random() * Math.PI * 2;
    const wobbleAmp = 2 + Math.random() * 12;
    const size = 0.4 + Math.random() * 1.8;

    const rNorm = (radius - minR) / (mr - minR);
    let hue, sat, light, alpha;

    if (rNorm < 0.15) {
      hue = 40 + Math.random() * 10;
      sat = 30 + Math.random() * 30;
      light = 85 + Math.random() * 15;
      alpha = 0.6 + Math.random() * 0.4;
    } else if (rNorm < 0.4) {
      hue = 35 + Math.random() * 15;
      sat = 90 + Math.random() * 10;
      light = 55 + Math.random() * 20;
      alpha = 0.4 + Math.random() * 0.4;
    } else if (rNorm < 0.7) {
      hue = 20 + Math.random() * 20;
      sat = 80 + Math.random() * 20;
      light = 40 + Math.random() * 20;
      alpha = 0.2 + Math.random() * 0.35;
    } else {
      hue = 5 + Math.random() * 20;
      sat = 70 + Math.random() * 30;
      light = 20 + Math.random() * 25;
      alpha = 0.06 + Math.random() * 0.2;
    }

    particles.push({
      angle, radius, speed, wobble, wobbleAmp, size,
      hue, sat, light, alpha, baseRadius: radius,
    });
  }

  function drawStars(t) {
    const eventR = isMobile ? 65 : 95;
    for (const s of stars) {
      const sx = s.x * W;
      const sy = s.y * H;
      const dx = sx - cx;
      const dy = sy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < eventR) continue;

      // Gravitational lensing distortion
      const lensStrength = Math.max(0, 1 - dist / (eventR * 4));
      const deflect = lensStrength * lensStrength * 35;
      const angle = Math.atan2(dy, dx);
      const finalX = sx + Math.cos(angle + Math.PI / 2) * deflect;
      const finalY = sy + Math.sin(angle + Math.PI / 2) * deflect;

      const flicker = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.flicker));
      ctx.beginPath();
      ctx.arc(finalX, finalY, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 250, 240, ${flicker * 0.5})`;
      ctx.fill();
    }
  }

  function drawAmbientGlow() {
    const glowR = Math.min(W, H) * 0.4;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grad.addColorStop(0, 'rgba(255, 140, 0, 0.03)');
    grad.addColorStop(0.3, 'rgba(255, 100, 0, 0.02)');
    grad.addColorStop(0.6, 'rgba(255, 60, 0, 0.008)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function drawLensingRing(t) {
    const ringRadius = isMobile ? 48 : 74;

    // Broad glow
    const grad = ctx.createRadialGradient(cx, cy, ringRadius * 0.7, cx, cy, ringRadius * 1.6);
    grad.addColorStop(0, 'rgba(255, 200, 100, 0)');
    grad.addColorStop(0.35, 'rgba(255, 180, 60, 0.04)');
    grad.addColorStop(0.5, 'rgba(255, 170, 0, 0.12)');
    grad.addColorStop(0.55, 'rgba(255, 200, 120, 0.18)');
    grad.addColorStop(0.6, 'rgba(255, 170, 0, 0.1)');
    grad.addColorStop(0.75, 'rgba(255, 100, 0, 0.03)');
    grad.addColorStop(1, 'rgba(255, 80, 0, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, ringRadius * 1.6, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Thin photon ring
    ctx.beginPath();
    ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 210, 130, ${0.2 + Math.sin(t * 0.7) * 0.06})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawShadow() {
    const shadowR = isMobile ? 40 : 60;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, shadowR * 1.5);
    grad.addColorStop(0, 'rgba(2, 1, 8, 1)');
    grad.addColorStop(0.6, 'rgba(2, 1, 8, 1)');
    grad.addColorStop(0.78, 'rgba(2, 1, 8, 0.97)');
    grad.addColorStop(1, 'rgba(2, 1, 8, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, shadowR * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function frame(ts) {
    time = ts * 0.001;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#020108';
    ctx.fillRect(0, 0, W, H);

    drawStars(time);
    drawAmbientGlow();

    // Accretion disk
    const tiltY = 0.32;
    const tiltShift = Math.sin(time * 0.08) * 4;

    for (const p of particles) {
      p.angle += p.speed * 0.016;
      const wobbleOffset = Math.sin(time * 0.6 + p.wobble) * p.wobbleAmp;
      const r = p.baseRadius + wobbleOffset;

      const x = cx + Math.cos(p.angle) * r;
      const y = cy + Math.sin(p.angle) * r * tiltY + tiltShift;

      const behind = Math.sin(p.angle);
      const depthAlpha = behind > 0 ? 1 : 0.25 + 0.75 * (1 + behind);
      const doppler = 1 + 0.3 * Math.cos(p.angle);

      const finalAlpha = p.alpha * depthAlpha * doppler;
      const finalLight = Math.min(100, p.light * doppler);

      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${finalLight}%, ${finalAlpha})`;
      ctx.fill();
    }

    drawLensingRing(time);
    drawShadow();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
